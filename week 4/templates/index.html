<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>week 4 任務</title>
        <link rel="stylesheet" type="text/css" href="/static/week4.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <div>歡迎光臨，請輸入信箱密碼</div>
            </header>
            <main>
                <div class="login">登入系統</div>
                <form action="/login" method="POST" onsubmit="return checkAgree()">
                    <div class="input">
                        <label for="email">信箱</label>
                        <input type="text" id="email" name="email" />
                    </div>

                    <div class="input">
                        <label for="password">密碼</label>
                        <input type="password" id="password" name="password" />
                    </div>

                    <div class="agree">
                        <label for="agree">同意條款</label>
                        <input type="checkbox" id="agree" />
                    </div>

                    <button type="submit">登入</button>
                </form>

                <div class="container2">
                    <div class="login">取得旅館資訊</div>
                        <div class="input">
                            <label for="hotelId">編號</label>
                            <input type="text" id="hotelId" />
                        </div>

                        <button type="button" onclick="getHotel()">取得</button>
                </div>
            </main>
        </div>

        <script src="/static/week4.js"></script>
    </body>
</html>
